tests:
  marine_regions:
    image: ghcr.io/vliz-be-opsci/grmp-test-implementations-ldes-validation:main
    config:
      TIMEOUT: 60  # Optional: timeout in seconds
      URLS: ['https://marineregions.org/feed.ttl']
      MIN-MEMBERS: 20
      MIN-FRAGMENTS: 6
      CREATE-ISSUE: false
      MAX-AGE-YOUNGEST-MEMBER: 24
  marineinfo:
    image: ghcr.io/vliz-be-opsci/grmp-test-implementations-ldes-validation:main
    config:
      TIMEOUT: 60  # Optional: timeout in seconds
      URLS: ['https://marineinfo.org/feed/dataset', 'https://marineinfo.org/feed/publication', 'https://marineinfo.org/feed/institute', 'https://marineinfo.org/feed/person', 'https://marineinfo.org/feed/project', 'https://marineinfo.org/feed/event']
      MIN-MEMBERS: 20
      MIN-FRAGMENTS: 10
      CREATE-ISSUE: false
      MAX-AGE-YOUNGEST-MEMBER: 24
